# Deploy backend Flask API on Render (free tier OK for testing).
# Dashboard: https://dashboard.render.com → New → Blueprint → connect repo.
#
# Uploads: add a Persistent Disk (mount /opt/render/project/src/backend/uploads)
# or files will be lost on redeploy.

services:
  - type: web
    name: phong-van-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed_admin.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: phong_van
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: MENTOR_ADMIN_URL
        sync: false
      - key: MENTEE_PROFILE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ADMIN_NOTIFY_EMAIL
        sync: false
      - key: SUPER_ADMIN_EMAILS
        sync: false
      - key: GOOGLE_DOCS_TEMPLATE_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
