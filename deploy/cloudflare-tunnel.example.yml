tunnel: phong-van
credentials-file: C:\Users\<ten-ban>\.cloudflared\<tunnel-id>.json

ingress:
  - hostname: mentee.yourdomain.com
    service: http://127.0.0.1:8080
  - hostname: mentor.yourdomain.com
    service: http://127.0.0.1:8080
  - hostname: admin.yourdomain.com
    service: http://127.0.0.1:8080
  - service: http_status:404
